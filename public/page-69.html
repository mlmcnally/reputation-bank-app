<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Exercise 7 – Page 69</title>

  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/auth.js"></script>

  <style>
    body{
      font-family:"Avenir","Nunito Sans",sans-serif;
      background:#f3f4f6;
      padding:2rem;
      margin:0;
      color:#000;
    }

    .top-bar{
      display:flex;
      justify-content:flex-end;
      margin-bottom:1rem;
    }

    h2{
      text-align:center;
      color:#084a58;
      font-size:28px;
      font-weight:800;
      margin-bottom:.5rem;
    }

    .form-note{
      color:#084a58;
      text-align:center;
      margin:0 auto 1rem auto;
      max-width:900px;
      font-size:16px;
      line-height:1.35;
    }

    .layout{
      display:flex;
      gap:2rem;
      align-items:flex-start;
      margin-top:1.25rem;
    }

    form{
      background:#fff;
      padding:20px;
      border-radius:8px;
      box-shadow:0 2px 10px rgba(0,0,0,.1);
      flex:1;
    }

    input,textarea{
      width:100%;
      margin-bottom:1rem;
      padding:8px;
      border-radius:4px;
      border:1px solid #ccc;
      font-family:inherit;
      box-sizing:border-box;
    }

    textarea{height:60px;}

    label strong{
      display:inline-block;
      margin-bottom:6px;
      color:#000;
    }

    .button-group{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:1rem;
    }

    .button-group button{
      flex:1;
      min-width:160px;
      background-color:#084a58;
      color:#fff;
      border:none;
      padding:10px 16px;
      border-radius:4px;
      cursor:pointer;
      box-shadow:2px 2px 4px rgba(0,0,0,.3);
      font-size:.95rem;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      font-family:inherit;
    }

    .button-group button:hover{opacity:.92;}

    .secondary-button{
      background-color:#d1d3d4 !important;
      color:#084a58 !important;
    }

    .secondary-button:hover{
      background-color:#c4c7c9 !important;
    }

    #status{
      margin-top:1rem;
      text-align:center;
      font-weight:700;
      color:#084a58;
      white-space:pre-wrap;
    }

    @media (max-width: 900px) {
      .layout {
        flex-direction: column;
      }

      .layout img {
        max-width: 100% !important;
      }

      .button-group button {
        min-width: 100%;
      }
    }
  </style>
</head>

<body>

  <div class="top-bar">
    <button type="button" class="secondary-button" onclick="signOutUser()">Sign Out</button>
  </div>

  <h2>Exercise 7 – Page 69</h2>

  <div class="form-note">
    Capture stakeholder insights and define the purposes of your communication.
    Please complete all five insights and five purposes.
  </div>

  <div class="layout">
    <img src="/page-69.jpg" alt="Exercise Page 69" style="max-width:45%; border-radius:8px; border:1px solid #ccc;" />

    <form id="exercise-form" autocomplete="off">
      <label><strong>Stakeholder Name</strong><br/>
        <input id="stakeholder" type="text" readonly />
      </label>

      <label><strong>Insight 1</strong><br/><textarea id="insight_1" autocomplete="off"></textarea></label>
      <label><strong>Insight 2</strong><br/><textarea id="insight_2" autocomplete="off"></textarea></label>
      <label><strong>Insight 3</strong><br/><textarea id="insight_3" autocomplete="off"></textarea></label>
      <label><strong>Insight 4</strong><br/><textarea id="insight_4" autocomplete="off"></textarea></label>
      <label><strong>Insight 5</strong><br/><textarea id="insight_5" autocomplete="off"></textarea></label>

      <label><strong>Purpose: Inform</strong><br/><textarea id="purpose_inform" autocomplete="off"></textarea></label>
      <label><strong>Purpose: Educate</strong><br/><textarea id="purpose_educate" autocomplete="off"></textarea></label>
      <label><strong>Purpose: Inspire</strong><br/><textarea id="purpose_inspire" autocomplete="off"></textarea></label>
      <label><strong>Purpose: Advocate</strong><br/><textarea id="purpose_advocate" autocomplete="off"></textarea></label>
      <label><strong>Purpose: Motivate</strong><br/><textarea id="purpose_motivate" autocomplete="off"></textarea></label>

      <div class="button-group">
        <button type="button" onclick="goBack()">⬅ Back One Page</button>
        <button type="button" onclick="saveData()">💾 Save</button>
        <button type="button" onclick="saveAndGoNext()">➡ Save & Next</button>
        <button type="button" onclick="window.print()">🖨️ Print</button>
        <button type="button" onclick="goToTOC()">Go to the Table of Contents</button>
      </div>

      <div id="status"></div>
    </form>
  </div>

  <script>
    const PAGE_TABLE = "exercise7_page69";
    const SOURCE_TABLE = "exercise2_page30";
    const NEXT_PAGE = "/page-70.html";
    const BACK_PAGE = "/page-68.html";

    const sb = window.RBAuth.sb;
    let currentUser = null;

    function setStatus(message = "", color = "#084a58") {
      const el = document.getElementById("status");
      if (!el) return;
      el.textContent = message;
      el.style.color = color;
    }

    function getValue(id) {
      return (document.getElementById(id)?.value || "").trim();
    }

    function validate(payload) {
      if (!payload.stakeholder) {
        return "Stakeholder could not be loaded from Exercise 2.";
      }

      for (let i = 1; i <= 5; i++) {
        if (!payload[`insight_${i}`]) {
          return `Please complete Insight ${i}.`;
        }
      }

      const purposes = ["inform", "educate", "inspire", "advocate", "motivate"];

      for (const p of purposes) {
        if (!payload[`purpose_${p}`]) {
          return `Please complete Purpose: ${p.charAt(0).toUpperCase() + p.slice(1)}.`;
        }
      }

      return null;
    }

    async function loadData() {
      currentUser = await window.RBAuth.requireUserOrRedirect();
      if (!currentUser) return;

      window.RBAuth.watchAuthState();

      const { data: saved, error: savedError } = await sb
        .from(PAGE_TABLE)
        .select("*")
        .eq("user_id", currentUser.id)
        .maybeSingle();

      if (savedError) {
        console.error("Load saved data error:", savedError);
        setStatus("Could not load saved data. Please refresh and try again.", "red");
        return;
      }

      const { data: stakeholderRow, error: stakeholderError } = await sb
        .from(SOURCE_TABLE)
        .select("stakeholder")
        .eq("user_id", currentUser.id)
        .maybeSingle();

      if (stakeholderError) {
        console.error("Load stakeholder error:", stakeholderError);
      }

      const stakeholderName =
        stakeholderRow?.stakeholder ||
        saved?.stakeholder ||
        "";

      const stakeholderField = document.getElementById("stakeholder");
      if (stakeholderField) {
        stakeholderField.value = stakeholderName;
      }

      if (!saved) return;

      for (let i = 1; i <= 5; i++) {
        const field = document.getElementById(`insight_${i}`);
        if (field) {
          field.value = saved[`insight_${i}`] || "";
        }
      }

      const purposes = ["inform", "educate", "inspire", "advocate", "motivate"];

      for (const p of purposes) {
        const field = document.getElementById(`purpose_${p}`);
        if (field) {
          field.value = saved[`purpose_${p}`] || "";
        }
      }
    }

    async function saveData() {
      if (!currentUser) {
        currentUser = await window.RBAuth.requireUserOrRedirect();
        if (!currentUser) return false;
      }

      const payload = {
        user_id: currentUser.id,
        stakeholder: getValue("stakeholder")
      };

      for (let i = 1; i <= 5; i++) {
        payload[`insight_${i}`] = getValue(`insight_${i}`);
      }

      const purposes = ["inform", "educate", "inspire", "advocate", "motivate"];

      for (const p of purposes) {
        payload[`purpose_${p}`] = getValue(`purpose_${p}`);
      }

      const validationError = validate(payload);

      if (validationError) {
        setStatus(validationError, "red");
        return false;
      }

      setStatus("Saving...");

      const { error } = await sb
        .from(PAGE_TABLE)
        .upsert(payload, { onConflict: "user_id" });

      if (error) {
        console.error("Save error:", error);
        setStatus("Save failed. Please try again.", "red");
        return false;
      }

      setStatus("Saved successfully!");
      return true;
    }

    async function saveAndGoNext() {
      const saved = await saveData();
      if (!saved) return;

      window.location.href = NEXT_PAGE;
    }

    function goBack() {
      window.location.href = BACK_PAGE;
    }

    function goToTOC() {
      window.location.href = "/page-3.html";
    }

    window.addEventListener("DOMContentLoaded", loadData);
  </script>
</body>
</html>
